<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, sans-serif;
      background: #0A1128;
      color: #E2EAF0;
      padding: 20px;
      width: 260px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .logo-circle {
      width: 36px; height: 36px;
      background: #00C853;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    h2 { font-size: 16px; font-weight: 700; }
    p { font-size: 12px; color: #8E95A3; margin-bottom: 16px; line-height: 1.5; }
    ul { font-size: 12px; color: #8E95A3; margin-bottom: 18px; padding-left: 14px; line-height: 1.8; }
    button {
      width: 100%;
      background: #00C853;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      background: #182244;
      color: #5A6070;
      cursor: not-allowed;
    }
    #status { font-size: 12px; color: #8E95A3; margin-top: 10px; text-align: left; min-height: 16px; word-break: break-word; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-circle">⚽</div>
    <h2>Scorepion Generator</h2>
  </div>
  <p>Generates all 11 app screens on Page 1 of this file.</p>
  <ul>
    <li>Splash &amp; Auth</li>
    <li>Onboarding Wizard</li>
    <li>Today — Daily Picks</li>
    <li>Matches, Leaderboard, Groups</li>
    <li>Profile, Match Detail</li>
    <li>Premium, Settings</li>
  </ul>
  <button id="runBtn" onclick="run()">Generate 11 Screens</button>
  <div id="status"></div>

  <script>
    function run() {
      document.getElementById('runBtn').disabled = true;
      document.getElementById('status').textContent = 'Building screens...';
      parent.postMessage({ pluginMessage: { type: 'run' } }, '*');
    }
    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'done') {
        document.getElementById('status').textContent = '✅ ' + msg.text;
      }
      if (msg.type === 'error') {
        document.getElementById('runBtn').disabled = false;
        document.getElementById('status').textContent = '❌ ' + msg.text;
      }
    };
  </script>
</body>
</html>

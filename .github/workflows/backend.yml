name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "shared/**"
      - "drizzle.config.ts"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "shared/**"
      - "drizzle.config.ts"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip tests (deploy only)"
        required: false
        default: false
        type: boolean

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  IMAGE_NAME: ghcr.io/${{ github.repository }}/backend

jobs:
  test:
    name: Lint · Typecheck · Test
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_tests) }}
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: scorepion_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: mysql://root:root@localhost:3306/scorepion_test
      NODE_ENV: test
      SESSION_SECRET: test-session-secret-not-used-outside-ci
      ADMIN_SECRET: test-admin-secret

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Typecheck (server)
        run: npm run typecheck:server

      - name: Lint
        run: npm run lint

      - name: Setup test database
        run: npx drizzle-kit push --force

      - name: Test
        run: npm test

      - name: Build server
        run: npm run server:build

  docker:
    name: Build & push image
    needs: test
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: docker
    if: |
      always() &&
      needs.docker.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ghcr.io/${{ github.repository }}/backend:latest
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_URL: ${{ vars.APP_URL }}
          FOOTBALL_API_PLAN: ${{ vars.FOOTBALL_API_PLAN }}
          FOOTBALL_API_DAILY_LIMIT: ${{ vars.FOOTBALL_API_DAILY_LIMIT }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE,GHCR_TOKEN,GH_ACTOR,DATABASE_URL,JWT_SECRET,ADMIN_SECRET,FOOTBALL_API_KEY,EXPO_ACCESS_TOKEN,APP_URL,FOOTBALL_API_PLAN,FOOTBALL_API_DAILY_LIMIT
          script: |
            set -e

            echo "==> Pulling latest image from GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker pull "$IMAGE"

            echo "==> Stopping old container (if running)..."
            docker stop scorepion-api 2>/dev/null || true
            docker rm scorepion-api 2>/dev/null || true

            echo "==> Starting new container..."
            docker run -d \
              --name scorepion-api \
              --restart unless-stopped \
              --network eduqube-network \
              -p 5847:5847 \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              -e NODE_ENV=production \
              -e PORT=5847 \
              -e DATABASE_URL="$DATABASE_URL" \
              -e APP_URL="$APP_URL" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e ADMIN_SECRET="$ADMIN_SECRET" \
              -e FOOTBALL_API_KEY="$FOOTBALL_API_KEY" \
              -e FOOTBALL_API_PLAN="$FOOTBALL_API_PLAN" \
              -e FOOTBALL_API_DAILY_LIMIT="$FOOTBALL_API_DAILY_LIMIT" \
              -e EXPO_ACCESS_TOKEN="$EXPO_ACCESS_TOKEN" \
              "$IMAGE"

            echo "==> Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:5847/api/health > /dev/null 2>&1; then
                echo "==> Health check passed!"
                docker ps --filter name=scorepion-api --format "table {{.Status}}\t{{.Ports}}"
                exit 0
              fi
              echo "    Attempt $i/30 — waiting 2s..."
              sleep 2
            done

            echo "==> Health check failed after 60s. Rolling back..."
            docker logs scorepion-api --tail 50
            docker stop scorepion-api 2>/dev/null || true
            docker rm scorepion-api 2>/dev/null || true
            exit 1

name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "shared/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "shared/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scorepion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/scorepion_test
      NODE_ENV: test
      SESSION_SECRET: test-session-secret-not-used-outside-ci
      ADMIN_SECRET: test-admin-secret

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Typecheck (server)
        run: npm run typecheck:server

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build server
        run: npm run server:build

  docker:
    name: Build & push image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy step — uncomment & wire up to your host (Fly / Render / ECS / Railway)
      # - name: Deploy to Fly.io
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --image ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

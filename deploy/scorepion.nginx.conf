upstream scorepion_backend {
    server 127.0.0.1:5847 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.scorepion.fans;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/scorepion-access.log;
    error_log /var/log/nginx/scorepion-error.log warn;

    # Health check (no logging noise)
    location = /api/health {
        proxy_pass http://scorepion_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Stripe webhook — pass signature header, keep raw body
    location = /api/stripe/webhook {
        proxy_pass http://scorepion_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header stripe-signature $http_stripe_signature;
        proxy_set_header Connection "";
    }

    # All other routes
    location / {
        proxy_pass http://scorepion_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 5m;
    }

    # Certbot will rewrite this block to 443 + SSL after running:
    #   sudo certbot --nginx -d api.scorepion.fans
}
